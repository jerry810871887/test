name: Daily Weather Push

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-coze-workflow:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coze workflow
        env:
          COZE_WORKFLOW_RUN_URL: ${{ secrets.COZE_WORKFLOW_RUN_URL }}
          COZE_API_TOKEN: ${{ secrets.COZE_API_TOKEN }}
          COZE_WORKFLOW_ID: ${{ secrets.COZE_WORKFLOW_ID }}
          KEYWORDS: ${{ secrets.KEYWORDS }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          url = os.environ["COZE_WORKFLOW_RUN_URL"].strip()
          token = os.environ["COZE_API_TOKEN"].strip()
          workflow_id = os.environ["COZE_WORKFLOW_ID"].strip()
          keywords = os.environ["KEYWORDS"].strip()

          print("workflow_id repr:", repr(workflow_id))
          print("keywords repr:", repr(keywords))

          body = {
              "workflow_id": workflow_id,
              "parameters": {
                  "keywords": keywords
              }
          }

          req = urllib.request.Request(
              url,
              data=json.dumps(body, ensure_ascii=False).encode("utf-8"),
              headers={
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json",
              },
              method="POST",
          )

          with urllib.request.urlopen(req, timeout=120) as resp:
              print(resp.read().decode("utf-8", errors="ignore"))
          PY
