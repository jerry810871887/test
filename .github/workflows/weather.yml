name: Daily Weather Push

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-coze-workflow:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coze workflow
        run: |
          curl -sS -X POST "${{ secrets.COZE_WORKFLOW_RUN_URL }}" \
            -H "Authorization: Bearer ${{ secrets.COZE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"workflow_id\":\"${{ secrets.COZE_WORKFLOW_ID }}\",\"parameters\":\"{\\\"keywords\\\":\\\"${{ secrets.KEYWORDS }}\\\"}\"}"
